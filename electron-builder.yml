appId: com.agyemanenterprises.shllshockd
productName: SHLLSHOCKD
copyright: Copyright 2026 Agyeman Enterprises

directories:
  output: out
  buildResources: assets

files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: electron/main.js

icon: assets/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SHLLSHOCKD

portable:
  artifactName: SHLLSHOCKD-portable.exe

publish: null
